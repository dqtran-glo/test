name: Sync Merge to Repo B

on:
  push:
    branches:
      - develop

jobs:
  sync-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to find the merge commit history

      - name: Extract Source Branch Name
        id: extract_branch
        run: |
          # Grabs the branch name from the merge commit message
          # Example: "Merge pull request #1 from origin/feature-xyz"
          RAW_BRANCH=$(git log -1 --pretty=%B | grep -oP '(?<=from ).*' | sed 's/origin\///')
          
          if [ -z "$RAW_BRANCH" ]; then
            echo "Could not identify source branch. Was this a direct push?"
            exit 1
          fi
          echo "branch_name=$RAW_BRANCH" >> $GITHUB_OUTPUT

      - name: Push to Repo B
        env:
          DEST_REPO: "https://${{ secrets.REPO_B_TOKEN }}@github.com/username/repo-b.git"
          BRANCH: ${{ steps.extract_branch.outputs.branch_name }}
        run: |
          # Add Repo B as a remote and push the specific branch
          git remote add destination $DEST_REPO
          git push destination HEAD:refs/heads/$BRANCH --force

      - name: Create Pull Request in Repo B
        env:
          GH_TOKEN: ${{ secrets.REPO_B_TOKEN }}
          BRANCH: ${{ steps.extract_branch.outputs.branch_name }}
          REPO_B: "username/repo-b"
        run: |
          # Use GitHub CLI to create the PR in the target repo
          gh pr create \
            --repo $REPO_B \
            --head $BRANCH \
            --base develop \
            --title "Sync: $BRANCH from Repo A" \
            --body "Automated PR created from Repo A merge to develop."