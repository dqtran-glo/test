name: Sync to Repo B (Metadata Version)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [ closed ]
jobs:
  # trigger:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Trigger Repo B
  #       run: |
  #         curl -X POST https://api.github.com/repos/dqtran-glo/test2/dispatches \
  #         -H "Accept: application/vnd.github+json" \
  #         -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
  #         -d '{
  #           "event_type":"run-from-repo-a",
  #           "client_payload": {
  #             "branch": "${{ github.event.pull_request.head.ref }}"
  #           }
  #         }'

  sync-code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      # - name: set branch name
      #   run: |
      #     echo "SOURCE_BRANCH=${{ github.event.pull_request.head.ref }}" >> $GITHUB_ENV

      - name: set branch name
        run: |
          echo "SOURCE_BRANCH=feat/dat-8" >> $GITHUB_ENV

      - name: print branch name
        run: |
          echo "SOURCE_BRANCH=${SOURCE_BRANCH}"

      - name: checkout repo test2
        uses: actions/checkout@v4
        with:
          repository: dqtran-glo/test2
          path: test2


      - name: print current directory
        run: |
          cd test2
          git remote -v
          echo "CURRENT_DIRECTORY=${{ github.workspace }}"
          echo "CURRENT_REPO=${{ github.repository }}"
      - name: add upstream remote
        working-directory: test2
        env:
          REPO_NAME: "dqtran-glo/test2"
        run: |
          if git remote get-url upstream > /dev/null 2>&1; then
            echo "upstream already exists"
          else
            git remote add upstream https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${REPO_NAME}.git
          fi

      - name: fetch upstream
        working-directory: test2
        run: |
          git fetch upstream

      # - name: check if source branch exists
      #   id: check-branch
      #   env: 
      #     REPO_NAME: "dqtran-glo/test2"
      #   run: |      
      #     if git ls-remote --exit-code --heads upstream "$SOURCE_BRANCH" > /dev/null; then
      #       echo "exists=true" >> $GITHUB_OUTPUT
      #     else
      #       echo "exists=false" >> $GITHUB_OUTPUT
      #     fi


      # - name: stop if branch does not exist
      #   if: steps.check-branch.outputs.exists == 'false'
      #   run: |
      #     echo "Source branch does not exist in Repo A"
      #     exit 1
      
      - name: create source branch
        working-directory: test2
        run: |
          git checkout -b $SOURCE_BRANCH

      - name: cherry-pick source branch
        working-directory: test2
        run: |
          git cherry-pick upstream/$SOURCE_BRANCH

      - name: push source branch
        working-directory: test2
        run: |
          git push origin $SOURCE_BRANCH

      - name: create PR if missing
        working-directory: test2
        env:
          REPO_NAME: "dqtran-glo/test2"
        run: |
          PR_EXISTS=$(gh pr list --repo ${REPO_NAME} --head ${SOURCE_BRANCH} --json number --jq '.[0].number')
          if [ -z "$PR_EXISTS" ]; then
              gh pr create \
                --repo ${REPO_NAME} \
                --head ${SOURCE_BRANCH} \
                --base main \
                --title "Sync: ${SOURCE_BRANCH}" \
                --body "Automated sync from Repo A"
            else
              echo "PR already exists in Repo A: #$PR_EXISTS"
            fi
