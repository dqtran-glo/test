name: Sync to Repo B

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main

jobs:
  create-pr-in-repo-b:
    runs-on: ubuntu-latest
    env:
      REPO_B: dqtran-glo/test2
      BASE_BRANCH: main
      SOURCE_REF: ${{ github.event.pull_request.head.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Rebuild merged PR commits onto Repo B branch
        id: sync_commits
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          echo "workflow_stop=false" >> "$GITHUB_OUTPUT"
          DEST_URL="https://x-access-token:${PAT}@github.com/${REPO_B}.git"
          git remote add destination "$DEST_URL"

          git fetch destination "+refs/heads/${BASE_BRANCH}:refs/__sync_parent__"
          PARENT_SHA="$(git rev-parse refs/__sync_parent__)"

          # Build a matching commit sequence from the PR branch in Repo A.
          COMMIT_LIST="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits" --jq '.[].sha')"
          if [ -z "$COMMIT_LIST" ]; then
            echo "No commits found on PR #${PR_NUMBER}; nothing to sync."
            echo "workflow_stop=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Start from Repo B base branch and replay only commit patches from the PR.
          git checkout --detach "$PARENT_SHA"

          while IFS= read -r PR_COMMIT_SHA; do
            [ -z "$PR_COMMIT_SHA" ] && continue

            PARENT_COUNT="$(git show -s --format=%P "$PR_COMMIT_SHA" | wc -w | tr -d ' ')"
            if [ "$PARENT_COUNT" -gt 1 ]; then
              git cherry-pick -m 1 "$PR_COMMIT_SHA"
            else
              git cherry-pick "$PR_COMMIT_SHA"
            fi
          done <<< "$COMMIT_LIST"

          NEW_HEAD_SHA="$(git rev-parse HEAD)"
          git push destination "${NEW_HEAD_SHA}:refs/heads/${SOURCE_REF}" --force

      - name: Create Pull Request in Repo B
        if: ${{ steps.sync_commits.outputs.workflow_stop != 'true' && env.SOURCE_REF != env.BASE_BRANCH }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          PR_EXISTS=$(gh pr list --repo "$REPO_B" --head "$SOURCE_REF" --base "$BASE_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ] || [ "$PR_EXISTS" = "null" ]; then
            gh pr create \
              --repo "$REPO_B" \
              --title "Sync: ${SOURCE_REF} from Repo A" \
              --body "Automated sync from merged PR #${PR_NUMBER} in \`${GITHUB_REPOSITORY}\`." \
              --head "$SOURCE_REF" \
              --base "$BASE_BRANCH"
          else
            echo "PR already exists (#$PR_EXISTS). Branch ${SOURCE_REF} was updated."
          fi
